version: "3.9"
services:
  postgres:
    image: postgres:17-alpine
    container_name: schoolid-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: schoolid
      POSTGRES_PASSWORD: schoolid
      POSTGRES_DB: schoolid
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolid"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
