services:
  app:
    build: .
    container_name: schoolid-app
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      # Point this to your Supabase direct connection string (port 5432)
      DATABASE_URL: "${DATABASE_URL}"
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: "${JWT_SECRET}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:5000}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:5000}"
      TRUSTED_ORIGINS: "${TRUSTED_ORIGINS:-http://localhost:5000}"
      SETUP_TOKEN: "${SETUP_TOKEN}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
