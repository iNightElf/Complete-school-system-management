services:
  postgres:
    image: postgres:17-alpine
    container_name: schoolid-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: schoolid
      POSTGRES_PASSWORD: schoolid
      POSTGRES_DB: schoolid
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U schoolid"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: schoolid-app
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      DATABASE_URL: "postgresql://schoolid:schoolid@postgres:5432/schoolid?sslmode=disable"
      NODE_ENV: production
      PORT: 5000
      JWT_SECRET: "${JWT_SECRET}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:5000}"
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:5000}"
      TRUSTED_ORIGINS: "${TRUSTED_ORIGINS:-http://localhost:5000}"
      SETUP_TOKEN: "${SETUP_TOKEN}"
      SMTP_HOST: "${SMTP_HOST}"
      SMTP_PORT: "${SMTP_PORT}"
      SMTP_USER: "${SMTP_USER}"
      SMTP_PASS: "${SMTP_PASS}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
